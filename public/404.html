<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      // Récupère la route demandée (ex: /vehicles)
      const path = window.location.pathname.replace("/autodepenses-frontend", "");

      // Transforme en route hashée
      const redirectTo = "/autodepenses-frontend/#" + path;

      window.location.replace(redirectTo);
    </script>
  </head>
  <body></body>
</html>
